<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報修管理端</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card" id="adminLoginSection">
      <div class="page-head">
        <div>
          <h1>報修管理端</h1>
          <p class="subtitle">請輸入管理碼登入。</p>
        </div>
        <a class="back-link" href="index.html">返回首頁</a>
      </div>

      <div id="loginAlert" class="alert" hidden></div>

      <form id="adminLoginForm" class="login-row">
        <div class="form-group grow">
          <label for="adminCode">管理碼</label>
          <input id="adminCode" type="password" autocomplete="current-password" required>
        </div>
        <div class="login-btn-wrap">
          <button type="submit" class="btn-primary">登入</button>
        </div>
      </form>
    </section>

    <section class="card" id="adminPanelSection" hidden>
      <div class="page-head">
        <div>
          <h1 id="adminPanelTitle">報修管理</h1>
          <p class="subtitle" id="adminPanelSubtitle"></p>
        </div>
        <div class="top-actions">
          <button type="button" class="btn-secondary" id="refreshBtn">重新整理</button>
          <button type="button" class="btn-danger-outline" id="logoutBtn">登出</button>
        </div>
      </div>

      <div id="adminAlert" class="alert" hidden></div>

      <div class="filters">
        <div class="form-group">
          <label for="statusFilter">狀態篩選</label>
          <select id="statusFilter">
            <option value="">全部狀態</option>
          </select>
        </div>

        <div class="form-group grow">
          <label for="keywordFilter">關鍵字搜尋</label>
          <input id="keywordFilter" type="text" placeholder="可搜尋報修人、單位、地點、設備名稱、問題描述">
        </div>

        <div class="filter-btn-wrap">
          <button type="button" class="btn-primary" id="searchBtn">查詢</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="repair-table">
          <thead>
            <tr>
              <th>報修編號</th>
              <th>報修時間</th>
              <th>報修人</th>
              <th>單位</th>
              <th>聯絡方式</th>
              <th>地點</th>
              <th>設備名稱</th>
              <th>問題描述</th>
              <th>緊急程度</th>
              <th>狀態</th>
              <th>處理人</th>
              <th>處理說明</th>
              <th>完成時間</th>
              <th>備註</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="repairsTableBody">
            <tr>
              <td colspan="15" class="empty-cell">尚無資料</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal" id="editModal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-head">
        <h2 id="editModalTitle">編輯報修單</h2>
        <button type="button" class="icon-btn" id="closeModalBtn" aria-label="關閉">×</button>
      </div>

      <div id="editAlert" class="alert" hidden></div>

      <form id="editForm" class="form-grid">
        <div class="form-group">
          <label for="editRepairId">報修編號</label>
          <input id="editRepairId" type="text" readonly>
        </div>

        <div class="form-group">
          <label for="editStatus">狀態</label>
          <select id="editStatus" required></select>
        </div>

        <div class="form-group">
          <label for="editHandler">處理人</label>
          <input id="editHandler" type="text">
        </div>

        <div class="form-group form-group-full">
          <label for="editHandleNote">處理說明</label>
          <textarea id="editHandleNote" rows="5"></textarea>
        </div>

        <div class="form-group form-group-full">
          <label for="editRemark">備註</label>
          <textarea id="editRemark" rows="3"></textarea>
        </div>

        <div class="form-actions form-group-full">
          <button type="submit" class="btn-primary">儲存更新</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", initAdminPage);
  </script>
</body>
</html>
