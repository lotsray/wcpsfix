<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報修管理端</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">

    <!-- ================= 登入區 ================= -->
    <section id="adminLoginSection" class="card">

      <h1>報修管理端登入</h1>
      <p class="subtitle">請輸入管理碼（資訊組 / 總務處）</p>

      <div id="loginAlert" class="alert" hidden></div>

      <form id="adminLoginForm" class="login-row">
        <div class="form-group grow">
          <label for="adminCode">管理碼</label>
          <input id="adminCode" type="password" placeholder="請輸入管理碼">
        </div>

        <div class="login-btn-wrap">
          <button type="submit" class="btn-primary">登入</button>
        </div>
      </form>

      <div style="margin-top: 16px;">
        <a class="text-link" href="index.html">← 返回首頁</a>
      </div>

    </section>

    <!-- ================= 管理面板 ================= -->
    <section id="adminPanelSection" class="card" hidden>

      <div class="page-head">
        <div>
          <h1 id="adminPanelTitle">報修管理</h1>
          <p id="adminPanelSubtitle" class="subtitle"></p>
        </div>

        <div class="top-actions">
          <button type="button" class="btn-secondary" id="refreshBtn">重新整理</button>
          <button type="button" class="btn-danger-outline" id="logoutBtn">登出</button>
        </div>
      </div>

      <div id="adminAlert" class="alert" hidden></div>

      <!-- 篩選區 -->
      <div class="filters">

        <div class="form-group">
          <label for="statusFilter">處理狀態</label>
          <select id="statusFilter">
            <option value="">全部狀態</option>
          </select>
        </div>

        <div class="form-group grow">
          <label for="keywordFilter">關鍵字搜尋</label>
          <input
            id="keywordFilter"
            type="text"
            placeholder="可搜尋報修人、單位、地點、設備名稱、問題描述"
          >
        </div>

        <div class="filter-btn-wrap">
          <button type="button" class="btn-primary" id="searchBtn">查詢</button>
        </div>

      </div>

      <!-- 表格 -->
      <div class="table-wrap">
        <table class="repair-table">
          <thead>
            <tr>
              <th>編號</th>
              <th>時間</th>
              <th>報修人</th>
              <th>單位</th>
              <th>聯絡</th>
              <th>地點</th>
              <th>設備</th>
              <th>問題</th>
              <th>急迫</th>
              <th>狀態</th>
              <th>處理人</th>
              <th>處理說明</th>
              <th>完成時間</th>
              <th>備註</th>
              <th>操作</th>
            </tr>
          </thead>

          <tbody id="repairsTableBody">
            <tr>
              <td colspan="15" class="empty-cell">尚無資料</td>
            </tr>
          </tbody>
        </table>
      </div>

    </section>

  </main>

  <!-- ================= 編輯視窗 ================= -->
  <div id="editModal" class="modal" hidden>

    <div class="modal-backdrop" id="modalBackdrop"></div>

    <div class="modal-dialog">

      <div class="modal-head">
        <h2>編輯報修資料</h2>
        <button class="icon-btn" id="closeModalBtn">×</button>
      </div>

      <div id="editAlert" class="alert" hidden></div>

      <form id="editForm" class="form-grid">

        <input type="hidden" id="editRepairId">

        <div class="form-group">
          <label for="editStatus">狀態</label>
          <select id="editStatus"></select>
        </div>

        <div class="form-group">
          <label for="editHandler">處理人</label>
          <input id="editHandler" type="text">
        </div>

        <div class="form-group form-group-full">
          <label for="editHandleNote">處理說明</label>
          <textarea id="editHandleNote"></textarea>
        </div>

        <div class="form-group form-group-full">
          <label for="editRemark">備註</label>
          <textarea id="editRemark"></textarea>
        </div>

        <div class="form-group form-group-full">
          <button type="submit" class="btn-primary">儲存修改</button>
        </div>

      </form>

    </div>

  </div>

  <!-- JS -->
  <script src="app.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", initAdminPage);
  </script>

</body>
</html>
